<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treinos Academia</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0C0C0E;
    --surface:   #141416;
    --surface2:  #1A1A1E;
    --surface3:  #202026;
    --border:    rgba(255,255,255,0.06);
    --border2:   rgba(255,255,255,0.11);
    --text:      #EBEBEB;
    --text2:     #808090;
    --text3:     #484858;
    --t1:        #60A5FA; /* azul — Treino 1 */
    --t1-dim:    rgba(96,165,250,0.10);
    --t2:        #34D399; /* verde — Treino 2 */
    --t2-dim:    rgba(52,211,153,0.10);
    --t3:        #F472B6; /* rosa — Treino 3 */
    --t3-dim:    rgba(244,114,182,0.10);
    --amber:     #FBBF24;
    --amber-dim: rgba(251,191,36,0.10);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 1.5rem;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  .card {
    width: 100%;
    max-width: 580px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.65);
    animation: up .4s ease both;
  }
  @keyframes up {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* ── HERO ── */
  .hero {
    padding: 1.5rem 1.5rem 1.25rem;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at top right, rgba(96,165,250,0.06) 0%, transparent 65%);
    pointer-events: none;
  }
  .hero-tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--t1);
    margin-bottom: 8px;
  }
  .hero-title {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 5px;
    letter-spacing: -0.01em;
  }
  .hero-sub {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.6;
  }
  .badge-row { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 12px; }
  .badge {
    font-size: 10px; font-weight: 600;
    padding: 2px 9px; border-radius: 99px;
    border: 1px solid; letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .b1 { background: var(--t1-dim); color: var(--t1); border-color: rgba(96,165,250,0.3); }
  .b2 { background: var(--t2-dim); color: var(--t2); border-color: rgba(52,211,153,0.3); }
  .b3 { background: var(--t3-dim); color: var(--t3); border-color: rgba(244,114,182,0.3); }
  .bx { background: var(--surface2); color: var(--text2); border-color: var(--border2); }
  .ba { background: var(--amber-dim); color: var(--amber); border-color: rgba(251,191,36,0.3); }

  /* ── NAV ── */
  .nav {
    display: flex;
    gap: 4px;
    padding: 10px 10px 0;
  }
  .nav-btn {
    flex: 1;
    padding: 8px 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 11.5px; font-weight: 600;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all .18s;
    text-align: center;
    letter-spacing: 0.01em;
  }
  .nav-btn:hover { color: var(--text); border-color: var(--border2); }
  .nav-btn.t1.active { background: var(--t1-dim); color: var(--t1); border-color: rgba(96,165,250,0.35); }
  .nav-btn.t2.active { background: var(--t2-dim); color: var(--t2); border-color: rgba(52,211,153,0.35); }
  .nav-btn.t3.active { background: var(--t3-dim); color: var(--t3); border-color: rgba(244,114,182,0.35); }

  /* ── TABS ── */
  .tab { display: none; }
  .tab.active { display: block; animation: fi .2s ease both; }
  @keyframes fi { from { opacity:0; } to { opacity:1; } }

  /* ── TAB HEADER ── */
  .t-header {
    padding: 1.1rem 1.5rem .9rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .t-num {
    font-family: 'Syne', sans-serif;
    font-size: 40px;
    font-weight: 800;
    line-height: 1;
    opacity: 0.12;
    flex-shrink: 0;
    letter-spacing: -2px;
  }
  .t-meta { flex: 1; }
  .t-name { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 3px; }
  .t-desc { font-size: 12px; color: var(--text2); }

  /* ── SUMMARY ROW ── */
  .summary {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }
  .sum-item {
    flex: 1;
    padding: 10px 0;
    text-align: center;
    border-right: 1px solid var(--border);
  }
  .sum-item:last-child { border-right: none; }
  .sum-val { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; }
  .sum-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }

  /* ── GRUPOS ── */
  .grupo { border-bottom: 1px solid var(--border); }
  .grupo:last-of-type { border-bottom: none; }

  .grupo-hd {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 1.5rem;
    cursor: pointer;
    user-select: none;
    transition: background .15s;
  }
  .grupo-hd:hover { background: var(--surface2); }

  .grupo-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .grupo-name { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text2); flex: 1; }
  .grupo-count { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); }
  .grupo-chev  { font-size: 8px; color: var(--text3); transition: transform .22s; margin-left: 4px; }

  .grupo-body { max-height: 0; overflow: hidden; transition: max-height .32s ease; }
  .grupo-body.open { max-height: 600px; }

  /* ── EXERCÍCIO ROW ── */
  .ex-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 1.5rem;
    border-top: 1px solid var(--border);
    transition: background .12s;
  }
  .ex-row:hover { background: var(--surface2); }

  .ex-idx {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    width: 16px;
    flex-shrink: 0;
    text-align: center;
  }
  .ex-name { font-size: 13px; font-weight: 500; flex: 1; line-height: 1.35; }

  .ex-chips { display: flex; gap: 5px; flex-shrink: 0; }
  .chip {
    font-family: 'DM Mono', monospace;
    font-size: 10.5px; font-weight: 500;
    padding: 2px 8px;
    border-radius: 5px;
    border: 1px solid;
    white-space: nowrap;
  }
  .chip-rep { background: var(--surface2); color: var(--text2); border-color: var(--border2); }
  .chip-ser { border-color: transparent; }

  /* ── CHECK ── */
  .ex-check {
    width: 20px; height: 20px;
    border-radius: 5px;
    border: 1.5px solid var(--border2);
    flex-shrink: 0;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
    background: transparent;
    font-size: 11px;
  }
  .ex-check.done {
    border-color: transparent;
    color: var(--bg);
  }
  .ex-row.done .ex-name {
    text-decoration: line-through;
    color: var(--text3);
  }

  /* ── PROGRESS BAR ── */
  .prog-wrap {
    padding: 8px 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .prog-bar-bg {
    flex: 1;
    height: 4px;
    background: var(--surface3);
    border-radius: 99px;
    overflow: hidden;
  }
  .prog-bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width .3s ease;
    width: 0%;
  }
  .prog-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    white-space: nowrap;
    min-width: 36px;
    text-align: right;
  }

  /* ── TOTAL ── */
  .total {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 1.5rem;
    background: var(--surface2);
    border-top: 1px solid var(--border);
  }
  .total span:first-child { font-size: 12.5px; color: var(--text2); }
  .total span:last-child  { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text2); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
</style>
</head>
<body>
<div class="card">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-tag">Academia · Hipertrofia</div>
    <div class="hero-title">Meus Treinos</div>
    <div class="hero-sub">3 treinos de musculação. Marque os exercícios conforme executa.</div>
    <div class="badge-row">
      <span class="badge b1">Treino 1</span>
      <span class="badge b2">Treino 2</span>
      <span class="badge b3">Treino 3</span>
      <span class="badge bx">12 reps</span>
      <span class="badge ba">Máquinas + Halteres</span>
    </div>
  </div>

  <!-- NAV -->
  <div class="nav">
    <button class="nav-btn t1 active" onclick="switchTab('t1')">Treino 1</button>
    <button class="nav-btn t2" onclick="switchTab('t2')">Treino 2</button>
    <button class="nav-btn t3" onclick="switchTab('t3')">Treino 3</button>
  </div>

  <!-- TABS -->
  <div id="tab-t1" class="tab active"></div>
  <div id="tab-t2" class="tab"></div>
  <div id="tab-t3" class="tab"></div>

</div>

<script>
var TAB_ORDER = ['t1','t2','t3'];

var CORES = {
  t1: { acc:'#60A5FA', dim:'rgba(96,165,250,0.10)', border:'rgba(96,165,250,0.3)', num:'01' },
  t2: { acc:'#34D399', dim:'rgba(52,211,153,0.10)',  border:'rgba(52,211,153,0.3)',  num:'02' },
  t3: { acc:'#F472B6', dim:'rgba(244,114,182,0.10)', border:'rgba(244,114,182,0.3)', num:'03' }
};

var TREINOS = {
  t1: {
    nome: 'Treino 1',
    desc: 'Peito · Costas · Ombros · Bíceps · Core',
    grupos: [
      { nome: 'Peito', exs: [
        { nome: 'Supino Máquina', rep: '12x', ser: 4 },
        { nome: 'Crucifixo Máquina', rep: '12x', ser: 3 }
      ]},
      { nome: 'Costas', exs: [
        { nome: 'Remada Máquina', rep: '12x', ser: 3 }
      ]},
      { nome: 'Ombros', exs: [
        { nome: 'Elevação Lateral no Halter', rep: '12x', ser: 4 },
        { nome: 'Elevação Frontal na Corda', rep: '12x', ser: 3 }
      ]},
      { nome: 'Bíceps', exs: [
        { nome: 'Rosca Martelo com Halter', rep: '12x', ser: 4 },
        { nome: 'Rosca na Polia', rep: '12x', ser: 2 }
      ]},
      { nome: 'Core + Tríceps', exs: [
        { nome: 'Abdominal Máquina', rep: '12x', ser: 3 },
        { nome: 'Paralelas', rep: '12x', ser: 3 }
      ]}
    ]
  },
  t2: {
    nome: 'Treino 2',
    desc: 'Costas · Peito · Ombros · Bíceps · Tríceps · Panturrilha',
    grupos: [
      { nome: 'Costas', exs: [
        { nome: 'Puxada Aberta', rep: '12x', ser: 4 }
      ]},
      { nome: 'Peito', exs: [
        { nome: 'Supino Máquina', rep: '12x', ser: 4 }
      ]},
      { nome: 'Ombros', exs: [
        { nome: 'Desenvolvimento Máquina', rep: '12x', ser: 4 },
        { nome: 'Fly Inversa', rep: '12x', ser: 3 }
      ]},
      { nome: 'Bíceps', exs: [
        { nome: 'Rosca Halter ou Barra', rep: '12x', ser: 4 },
        { nome: 'Rosca Martelo na Polia', rep: '12x', ser: 4 }
      ]},
      { nome: 'Tríceps', exs: [
        { nome: 'Tríceps Polia', rep: '12x', ser: 3 },
        { nome: 'Tríceps Máquina', rep: '12x', ser: 3 }
      ]},
      { nome: 'Panturrilha', exs: [
        { nome: 'Panturrilha Máquina Vertical', rep: '12x', ser: 3 }
      ]}
    ]
  },
  t3: {
    nome: 'Treino 3',
    desc: 'Peito · Costas · Ombros · Bíceps · Pernas',
    grupos: [
      { nome: 'Peito', exs: [
        { nome: 'Supino Máquina', rep: '12x', ser: 4 }
      ]},
      { nome: 'Costas', exs: [
        { nome: 'Pulldown Braços Estendidos (Straight-arm)', rep: '12x', ser: 3 }
      ]},
      { nome: 'Ombros', exs: [
        { nome: 'Elevação Lateral na Corda', rep: '12x', ser: 4 },
        { nome: 'Elevação Frontal na Corda', rep: '12x', ser: 3 }
      ]},
      { nome: 'Bíceps', exs: [
        { nome: 'Rosca na Polia', rep: '12x', ser: 2 }
      ]},
      { nome: 'Pernas', exs: [
        { nome: 'Agachamento Máquina', rep: '12x', ser: 3 },
        { nome: 'Cadeira Extensora', rep: '12x', ser: 3 },
        { nome: 'Cadeira Flexora', rep: '12x', ser: 3 }
      ]},
      { nome: 'Panturrilha', exs: [
        { nome: 'Panturrilha Máquina Sentado', rep: '12x', ser: 3 }
      ]}
    ]
  }
};

// Estado de checks por treino
var checks = { t1:{}, t2:{}, t3:{} };

function totalExs(key) {
  var n = 0;
  TREINOS[key].grupos.forEach(function(g) { n += g.exs.length; });
  return n;
}

function totalSeries(key) {
  var n = 0;
  TREINOS[key].grupos.forEach(function(g) {
    g.exs.forEach(function(ex) { n += ex.ser; });
  });
  return n;
}

function doneCount(key) {
  return Object.values(checks[key]).filter(Boolean).length;
}

function buildTab(key) {
  var t = TREINOS[key];
  var c = CORES[key];
  var tab = document.getElementById('tab-' + key);

  var total = totalExs(key);
  var series = totalSeries(key);
  var done = doneCount(key);
  var pct = total > 0 ? Math.round((done / total) * 100) : 0;

  // grupos
  var gruposHtml = '';
  var exGlobal = 0;
  t.grupos.forEach(function(g, gi) {
    var exsHtml = '';
    g.exs.forEach(function(ex, ei) {
      exGlobal++;
      var id = key + '-' + gi + '-' + ei;
      var isDone = checks[key][id] || false;
      exsHtml +=
        '<div class="ex-row' + (isDone ? ' done' : '') + '" id="row-' + id + '">' +
          '<span class="ex-idx">' + exGlobal + '</span>' +
          '<span class="ex-name">' + ex.nome + '</span>' +
          '<div class="ex-chips">' +
            '<span class="chip chip-rep">' + ex.rep + '</span>' +
            '<span class="chip chip-ser" style="background:' + c.dim + ';color:' + c.acc + ';border-color:' + c.border + '">' + ex.ser + ' séries</span>' +
          '</div>' +
          '<div class="ex-check' + (isDone ? ' done' : '') + '" id="chk-' + id + '" style="' + (isDone ? 'background:' + c.acc + ';' : '') + '" onclick="toggleEx(\'' + key + '\',' + gi + ',' + ei + ')">' +
            (isDone ? '✓' : '') +
          '</div>' +
        '</div>';
    });

    var bodyId = 'gbody-' + key + '-' + gi;
    var chevId = 'gchev-' + key + '-' + gi;
    gruposHtml +=
      '<div class="grupo">' +
        '<div class="grupo-hd" onclick="togGrupo(\'' + bodyId + '\',\'' + chevId + '\')">' +
          '<div class="grupo-dot" style="background:' + c.acc + '"></div>' +
          '<span class="grupo-name">' + g.nome + '</span>' +
          '<span class="grupo-count">' + g.exs.length + ' ex.</span>' +
          '<span class="grupo-chev" id="' + chevId + '">▼</span>' +
        '</div>' +
        '<div class="grupo-body open" id="' + bodyId + '">' + exsHtml + '</div>' +
      '</div>';
  });

  tab.innerHTML =
    '<div class="t-header">' +
      '<div class="t-num" style="color:' + c.acc + '">' + c.num + '</div>' +
      '<div class="t-meta">' +
        '<div class="t-name">' + t.nome + '</div>' +
        '<div class="t-desc">' + t.desc + '</div>' +
      '</div>' +
    '</div>' +

    '<div class="summary">' +
      '<div class="sum-item"><div class="sum-val" style="color:' + c.acc + '">' + total + '</div><div class="sum-lbl">Exercícios</div></div>' +
      '<div class="sum-item"><div class="sum-val" style="color:' + c.acc + '">' + series + '</div><div class="sum-lbl">Séries</div></div>' +
      '<div class="sum-item"><div class="sum-val" style="color:' + c.acc + '">' + t.grupos.length + '</div><div class="sum-lbl">Grupos</div></div>' +
      '<div class="sum-item"><div class="sum-val" style="color:' + c.acc + '">' + done + '/' + total + '</div><div class="sum-lbl">Concluídos</div></div>' +
    '</div>' +

    '<div class="prog-wrap">' +
      '<div class="prog-bar-bg"><div class="prog-bar-fill" id="bar-' + key + '" style="width:' + pct + '%;background:' + c.acc + '"></div></div>' +
      '<span class="prog-label" id="pct-' + key + '">' + pct + '%</span>' +
    '</div>' +

    '<div>' + gruposHtml + '</div>' +

    '<div class="total"><span>Total de séries</span><span>' + series + ' séries · 12 reps cada</span></div>';
}

TAB_ORDER.forEach(buildTab);

function toggleEx(key, gi, ei) {
  var id = key + '-' + gi + '-' + ei;
  checks[key][id] = !checks[key][id];
  var isDone = checks[key][id];
  var c = CORES[key];

  var row  = document.getElementById('row-' + id);
  var chk  = document.getElementById('chk-' + id);
  if (row) row.classList.toggle('done', isDone);
  if (chk) {
    chk.classList.toggle('done', isDone);
    chk.style.background = isDone ? c.acc : '';
    chk.innerHTML = isDone ? '✓' : '';
  }

  // atualizar barra
  var total = totalExs(key);
  var done  = doneCount(key);
  var pct   = total > 0 ? Math.round((done / total) * 100) : 0;
  var bar = document.getElementById('bar-' + key);
  var pctEl = document.getElementById('pct-' + key);
  if (bar)   bar.style.width = pct + '%';
  if (pctEl) pctEl.textContent = pct + '%';

  // atualizar summary
  var sumDone = document.querySelector('#tab-' + key + ' .sum-item:last-child .sum-val');
  if (sumDone) sumDone.textContent = done + '/' + total;
}

function togGrupo(bodyId, chevId) {
  var body = document.getElementById(bodyId);
  var chev = document.getElementById(chevId);
  if (!body || !chev) return;
  var open = body.classList.toggle('open');
  chev.style.transform = open ? '' : 'rotate(-90deg)';
}

function switchTab(k) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
  var el = document.getElementById('tab-' + k);
  if (el) el.classList.add('active');
  var idx = TAB_ORDER.indexOf(k);
  var btns = document.querySelectorAll('.nav-btn');
  if (btns[idx]) btns[idx].classList.add('active');
}
</script>
</body>
</html>
